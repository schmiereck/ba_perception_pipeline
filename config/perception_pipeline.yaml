# Parameters for the perception_pipeline_node.
#
# Uses "/**" wildcard so the same YAML works regardless of namespace/node name.
/**:
  ros__parameters:
    # --- Topics ---
    image_topic: "/ba_overview_camera/image_raw/compressed"
    camera_info_topic: "/ba_overview_camera/camera_info"
    request_topic: "/ba_perception/detect_request"
    pose_topic: "/ba_perception/target_pose"
    pose_cam_topic: "/ba_perception/target_pose_cam"
    status_topic: "/ba_perception/status"
    depth_debug_topic: "/ba_overview_camera/depth/image_raw"

    # --- Depth Anything V2 ---
    depth_model_id: "depth-anything/Depth-Anything-V2-Small-hf"
    depth_device: "cpu"

    # --- VLM ---
    # Provider: "groq" or "gemini"
    vlm_provider: "groq"
    vlm_model: "meta-llama/llama-4-scout-17b-16e-instruct"
    # API key — set via environment variable or override here.
    # IMPORTANT: do not commit real API keys to git!
    vlm_api_key: ""

    # --- Rectification ---
    rectify: true

    # --- Hand-Eye Transform ---
    # 4x4 matrix (row-major) mapping camera frame → robot base frame.
    # Identity = no transform (camera = robot frame).
    # Replace with calibrated values.
    # NOTE: This matrix has been post-composed with R_z(+90°) on the LEFT
    # to rotate from the physical user-frame (used during ruler-based
    # calibration: +X = physical forward) to the URDF base_link frame
    # (URDF +Y = physical forward, since the robot is mounted such that
    # joint_0 = π/2 with joint_1 folded forward reaches physical +X).
    hand_eye_transform: [
      -0.07478, -0.90259,  0.42396, -0.14476,
      -0.99604,  0.08810,  0.01188,  0.16071,
      -0.04808, -0.42140, -0.90560,  0.36451,
       0.00000,  0.00000,  0.00000,  1.00000,
    ]

    # --- Depth Calibration ---
    # Path to depth_calibration.yaml (from calibrate_depth.py).
    # Maps relative DA V2 depth to metric meters.
    # Leave empty ("") to use relative depth (no scaling).
    depth_calibration_file: "/home/thomas/ros2_ws/src/ba_perception_pipeline/config/depth_calibration.yaml"

    # --- Ray-Plane Intersection (for on-table grasping) ---
    # When set to a finite value, the VLM pixel ray is intersected with the
    # plane Z_robot = target_plane_z (meters) and monocular depth is bypassed.
    # This is far more accurate than DA V2 for known target planes (table top).
    # Use .nan to disable and fall back to depth-based backprojection.
    # Empirical finding (2026-04-17): The VLM latches on the object's BOTTOM
    # edge (where object meets the table), not the top. At steep downward
    # camera angles on short objects the bottom rim dominates the visible
    # silhouette. Use 0.00 (table level) for short objects on a table;
    # raise only for tall objects where the VLM picks a higher feature.
    #target_plane_z: 0.0
    target_plane_z: .nan

    # --- Debug ---
    # Set to a directory path to save debug images (depth + annotated).
    # Leave empty ("") to disable.
    debug_save_path: "/tmp"
